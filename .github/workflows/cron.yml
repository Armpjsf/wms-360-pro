name: WMS Scheduled Jobs

# Replaces Vercel Hobby crons (which fire imprecisely, up to ~1h late).
# GitHub Actions fires close to schedule and calls the endpoints directly.
# NOTE: GitHub cron uses UTC. Thailand is UTC+7.
#   16:30 ICT (cycle-count) = 09:30 UTC.

on:
  schedule:
    # Cycle-count stock check: 09:30 UTC = 16:30 ICT, Mon–Fri
    - cron: "30 9 * * 1-5"
    # NOTE: the new-job notification is sent instantly by /api/orders/process
    # when staff press "process", so no polling of /api/cron/jobs is needed.
  workflow_dispatch: {} # allow manual run from the Actions tab

concurrency:
  group: wms-cron
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call cycle-count (16:30 ICT weekdays)
        run: |
          curl --fail --silent --show-error --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.WMS_BASE_URL }}/api/cron/cycle-count"
